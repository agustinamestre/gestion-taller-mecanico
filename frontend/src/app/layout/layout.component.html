
<p-toast position="top-right" />

<div class="app-layout">
  
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-container">
      <h2 class="logo-text">⚙️ TallerApp</h2>
      <h2 class="logo-icon">⚙️</h2>
    </div>
    <nav class="nav-menu">
      <ul>
        <li><a routerLink="/dashboard" routerLinkActive="active"><i class="pi pi-home"></i> <span>Dashboard</span></a></li>
        <li><a routerLink="/clientes" routerLinkActive="active"><i class="pi pi-users"></i> <span>Clientes</span></a></li>

    <footer class="app-footer">
