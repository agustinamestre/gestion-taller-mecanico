spring.application.name=gestion-taller

spring.profiles.active=dev

# Server configuration
server.port=8090
server.servlet.context-path=/gestion-taller

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Para ver los valores de los parametros en los logs de SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# URL donde estara disponible la UI de Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# URL del JSON con la especificacion OpenAPI
springdoc.api-docs.path=/api-docs

# Ordenar endpoints alfabeticamente
springdoc.swagger-ui.operationsSorter=alpha
